title: "FroglyStudios Blog"
author: "Frogly Studios Team"
description: "We are talking about news and updates at Frogly Studios" # This will show up in places like twitter, linkedin, etc, if you share your sites url as a post.

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
email: "contact@frogly.fun"
twitter_username: "froglystudios"
github_username: "froglystudios"
#linkedin_username: "froglystudios"
#facebook_username: username
#flickr_username: username
instagram_username: "froglystudios"
#pinterest_username: username
youtube_username: "froglystudios"
#googleplus_username: +username

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
